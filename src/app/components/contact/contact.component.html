 <section class="contact" id="contact" style="padding: 10rem 9% 2rem;">
    <h2 class="heading" style="text-align: center; font-size: 4.5rem; margin-bottom: 3rem; color: #fff;">Contact <span style="color: #00abf0;">Me!</span></h2>

    <form (submit)="sendEmail($event, nameInput.value, emailInput.value, messageInput.value)">
        <div class="input-box" style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 2rem;">
            <div class="input-field" style="position: relative; width: 49%; margin: .8rem 0;">
                <input #nameInput type="text" name="name" placeholder="Full Name" required style="width: 100%; padding: 1.5rem; font-size: 1.6rem; color: #fff; background: #081b29; border: .2rem solid #00abf0; border-radius: .6rem;">
                <span class="focus"></span>
            </div>
            <div class="input-field" style="position: relative; width: 49%; margin: .8rem 0;">
                <input #emailInput type="email" name="email" placeholder="Email Address" required style="width: 100%; padding: 1.5rem; font-size: 1.6rem; color: #fff; background: #081b29; border: .2rem solid #00abf0; border-radius: .6rem;">
                <span class="focus"></span>
            </div>
        </div>

        <div class="input-box" style="display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 2rem;">
            <div class="input-field" style="position: relative; width: 49%; margin: .8rem 0;">
                <input type="tel" name="phone" placeholder="Mobile Number" required style="width: 100%; padding: 1.5rem; font-size: 1.6rem; color: #fff; background: #081b29; border: .2rem solid #00abf0; border-radius: .6rem;">
                <span class="focus"></span>
            </div>
            <div class="input-field" style="position: relative; width: 49%; margin: .8rem 0;">
                <input type="text" name="subject" placeholder="Email Subject" required style="width: 100%; padding: 1.5rem; font-size: 1.6rem; color: #fff; background: #081b29; border: .2rem solid #00abf0; border-radius: .6rem;">
                <span class="focus"></span>
            </div>
        </div>
        
        <div class="textarea-field" style="position: relative; margin: .8rem 0 2.7rem; display: flex;">
            <textarea #messageInput name="message" cols="30" rows="10" placeholder="Your Message" required style="width: 100%; height: 25rem; padding: 1.5rem; font-size: 1.6rem; color: #fff; background: #081b29; border: .2rem solid #00abf0; border-radius: .6rem; resize: none;"></textarea>
            <span class="focus"></span>
        </div>

        <div class="btn-box btns" style="display: flex; justify-content: center;">
            <button type="submit" class="btn" style="cursor: pointer; pointer-events: auto; padding: 1.5rem 3.5rem; font-size: 1.6rem; background: #00abf0; border: .2rem solid #00abf0; border-radius: .6rem; color: #081b29; font-weight: 600; letter-spacing: .1rem; transition: .5s;">Submit</button>
        </div>
    </form>
</section>
